name: 'Sonar'
on:
  workflow_run:
    workflows: [ Build ]
    types:
      - completed
env:
  MAVEN_ARGS: "-B -ntp"
jobs:
  sonar:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      actions: read
    steps:
      - name: 'Sonar analysis'
        uses: evaristegalois11/sonar-fork-analysis@9d67a15f17407c3bf39bb09c39a9d5d3794eeecd # v1.3.0
        with:
          distribution: temurin
          java-version: 26
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          project-key: instancio_instancio
